<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Quest</title>

    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">

        <h1>⚔️ Dungeon Quest ⚔️</h1>

        <div class="player-card">

            <h2>Hero Stats</h2>

            <p>❤️ HP: <span id="hp">100</span></p>

            <p>⭐ Level: <span id="level">1</span></p>

            <p>💰 Gold: <span id="gold">50</span></p>

            <p>🗡️ Weapon: <span id="weapon">Wooden Sword</span></p>

        </div>

        <div class="buttons">

            <button id="fightBtn">⚔️ Fight</button>

            <button id="healBtn">❤️ Heal</button>

            <button id="inventoryBtn">🎒 Inventory</button>

            <button id="shopBtn">🛒 Shop</button>

            <button id="saveBtn">💾 Save</button>

            <button id="resetBtn">🔄 Reset</button>

        </div>

        <div class="log">

            <h2>Battle Log</h2>

            <p id="battleLog">
    ⚔️ Ready for battle!
</p>

        </div>

    </div>

<script src="script.js"></script>

</body>
</html>
