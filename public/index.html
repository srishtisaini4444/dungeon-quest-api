<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dungeon Quest</title>

    <link rel="stylesheet" href="style.css">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600;700&family=Poppins:wght@300;400;500;600&display=swap" rel="stylesheet">

    <script src="https://kit.fontawesome.com/7f4a0b8e5f.js" crossorigin="anonymous"></script>
</head>

<body>

<div class="overlay"></div>

<div class="container">

<header>

<h1>⚔ DUNGEON QUEST ⚔</h1>

<p>Your adventure awaits...</p>

</header>

<div class="main-grid">

<!-- LEFT -->

<div class="hero-card">

<div class="avatar">

<img src="./assets/hero.png">

</div>

<h2>Hero</h2>

<div class="stats">

<p>❤️ HP <span id="hp">100</span></p>

<p>⭐ Level <span id="level">1</span></p>

<p>💰 Gold <span id="gold">50</span></p>

<p>🗡 Weapon</p>

<h3 id="weapon">Wooden Sword</h3>

</div>

</div>

<!-- CENTER -->

<div class="center-panel">

<h2>Actions</h2>

<div class="button-grid">

<button id="fightBtn">⚔ Fight</button>

<button id="healBtn">❤️ Heal</button>

<button id="inventoryBtn">🎒 Inventory</button>

<button id="shopBtn">🛒 Shop</button>

<button id="saveBtn">💾 Save</button>

<button id="resetBtn">🔄 Reset</button>

</div>

<div class="battle-card">

<h2>Battle Log</h2>

<div id="battleLog">

Welcome to Dungeon Quest!

</div>

</div>

</div>

<!-- RIGHT -->

<div class="info-card">

<h2>Quick Stats</h2>

<div class="info-item">

<span>❤️ HP</span>

<span id="hpSide">100</span>

</div>

<div class="info-item">

<span>⭐ Level</span>

<span id="levelSide">1</span>

</div>

<div class="info-item">

<span>💰 Gold</span>

<span id="goldSide">50</span>

</div>

<div class="info-item">

<span>🗡 Weapon</span>

<span id="weaponSide">Wooden Sword</span>

</div>

</div>

</div>

</div>

<script src="script.js"></script>

</body>
</html>
